id: faers_quarterly_ingest
namespace: faers
description: |
  Downloads one FAERS quarterly ZIP from the FDA HTTPS endpoint, extracts
  the 7 ASCII flat files (DEMO, DRUG, REAC, OUTC, RPSR, THER, INDI),
  normalises filenames to lowercase, uploads them to GCS under
  raw/faers/{year}{quarter}/, and loads each file into a BigQuery raw table.
  Idempotent: WRITE_TRUNCATE means re-running the same quarter is safe.

labels:
  project: faers-pharmacovigilance
  layer: ingestion

inputs:
  - id: year
    type: INT
    defaults: 2023
    description: "4-digit year of the FAERS quarterly export (e.g. 2023)"

  - id: quarter
    type: STRING
    defaults: "Q4"
    description: "Quarter identifier - must be Q1, Q2, Q3, or Q4"

variables:
  gcs_bucket: "de-zoomcamp-faers-lake-2026"
  gcp_project: "de-zoomcamp-faers-lake"
  fda_url: "https://fis.fda.gov/content/Exports/faers_ascii_{{ inputs.year }}{{ inputs.quarter | lower }}.zip"
  gcs_prefix: "raw/faers/{{ inputs.year }}{{ inputs.quarter | upper }}"
  table_suffix: "{{ inputs.year }}{{ inputs.quarter | lower }}"

tasks:

  - id: log_start
    type: io.kestra.plugin.core.log.Log
    message: "Starting FAERS ingestion - year={{ inputs.year }}, quarter={{ inputs.quarter }}"
    level: INFO

  - id: download_extract_upload
    type: io.kestra.plugin.scripts.python.Script
    description: "Download FAERS ZIP, extract 7 flat files, upload to GCS"
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    dependencies:
      - requests
      - google-cloud-storage
    env:
      GCS_BUCKET: "{{vars.gcs_bucket}}"
      FDA_URL: "{{render(vars.fda_url)}}"
      GCS_PREFIX: "{{render(vars.gcs_prefix)}}"
      GOOGLE_CLOUD_PROJECT: "{{vars.gcp_project}}"
    script: |
      import io, logging, os, zipfile
      import requests
      from google.cloud import storage

      logging.basicConfig(level=logging.INFO, format="%(levelname)s  %(message)s")
      log = logging.getLogger(__name__)

      FILE_TYPES = ["demo", "drug", "reac", "outc", "rpsr", "ther", "indi"]

      fda_url    = os.environ["FDA_URL"]
      gcs_bucket = os.environ["GCS_BUCKET"]
      gcs_prefix = os.environ["GCS_PREFIX"]

      log.info(f"Downloading {fda_url}")
      resp = requests.get(fda_url, timeout=300, stream=True)
      resp.raise_for_status()
      zip_bytes = io.BytesIO(resp.content)
      log.info(f"Download complete ({len(resp.content) / 1_000_000:.1f} MB)")

      client   = storage.Client()
      bucket   = client.bucket(gcs_bucket)
      uploaded = []

      with zipfile.ZipFile(zip_bytes) as zf:
          for entry in zf.namelist():
              basename = os.path.basename(entry).lower()
              if not basename.endswith(".txt"):
                  continue
              stem = os.path.splitext(basename)[0]
              matched = next((ft for ft in FILE_TYPES if stem.startswith(ft)), None)
              if matched is None:
                  log.warning(f"Skipping unrecognised file in ZIP: {entry}")
                  continue
              gcs_path = f"{gcs_prefix}/{matched}.txt"
              log.info(f"Uploading {entry} to gs://{gcs_bucket}/{gcs_path}")
              with zf.open(entry) as src:
                  blob = bucket.blob(gcs_path)
                  blob.upload_from_file(src, content_type="text/plain")
              uploaded.append(matched)

      missing = set(FILE_TYPES) - set(uploaded)
      if missing:
          raise ValueError(
              f"ZIP was missing expected FAERS file types: {sorted(missing)}. "
              f"Found: {sorted(uploaded)}"
          )

      log.info(f"All 7 files uploaded to gs://{gcs_bucket}/{gcs_prefix}/")

  - id: load_demo
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.demo_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/demo.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: load_drug
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.drug_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/drug.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: load_reac
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.reac_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/reac.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: load_outc
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.outc_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/outc.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: load_rpsr
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.rpsr_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/rpsr.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: load_ther
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.ther_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/ther.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: load_indi
    type: io.kestra.plugin.gcp.bigquery.LoadFromGcs
    destinationTable: "faers_raw.indi_{{render(vars.table_suffix)}}"
    from:
      - "gs://{{vars.gcs_bucket}}/{{render(vars.gcs_prefix)}}/indi.txt"
    format: CSV
    autodetect: true
    createDisposition: CREATE_IF_NEEDED
    writeDisposition: WRITE_TRUNCATE
    ignoreUnknownValues: true
    csvOptions:
      fieldDelimiter: "$"
      skipLeadingRows: 1
      allowJaggedRows: true
      allowQuotedNewLines: false

  - id: log_success
    type: io.kestra.plugin.core.log.Log
    message: "FAERS {{ inputs.year }} {{ inputs.quarter }} ingestion complete. 7 tables loaded into faers_raw."
    level: INFO

errors:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    message: "FAERS {{ inputs.year }} {{ inputs.quarter }} ingestion FAILED. Review task logs for details."
    level: ERROR

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      projectId: "{{vars.gcp_project}}"
      location: US
